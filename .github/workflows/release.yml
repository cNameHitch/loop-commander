name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.1.0)'
        required: false
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Pre-Release Tests
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-

      - name: Run all tests
        run: cargo test --workspace --verbose
        env:
          RUST_TEST_THREADS: 1
          CI: true

  build:
    name: Build Release
    needs: test
    runs-on: macos-14
    outputs:
      version: ${{ steps.version.outputs.version }}
      rust-artifacts: ${{ steps.build-rust.outputs.artifacts }}
      app-artifact: ${{ steps.build-app.outputs.artifact }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag or input
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+.*$ ]]; then
            echo "Invalid version format: $VERSION"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-target-release-

      - name: Build Rust binaries
        id: build-rust
        run: |
          cargo build --release
          mkdir -p dist

          # Copy binaries
          cp target/release/loop-commander dist/
          cp target/release/lc-runner dist/
          cp target/release/lc dist/

          # Create tarball with binaries
          TARBALL="loop-commander-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz"
          tar -C dist -czf "dist/$TARBALL" loop-commander lc-runner lc

          echo "artifacts=$TARBALL" >> $GITHUB_OUTPUT
          echo "Built tarball: dist/$TARBALL"
          ls -lh "dist/$TARBALL"

      - name: Build Swift app
        id: build-app
        run: |
          cd macos-app
          swift build -c release

          # Build the .app bundle
          bash build-app.sh

          cd build
          APP_NAME="Loop Commander.app"
          ZIP_NAME="LoopCommander-${{ steps.version.outputs.version }}.zip"

          # Create zip archive of the app
          ditto -c -k --sequesterRsrc --keepParent "$APP_NAME" "$ZIP_NAME"
          mv "$ZIP_NAME" ../../dist/

          cd ../..
          echo "artifact=LoopCommander-${{ steps.version.outputs.version }}.zip" >> $GITHUB_OUTPUT
          echo "Built app: dist/LoopCommander-${{ steps.version.outputs.version }}.zip"
          ls -lh "dist/LoopCommander-${{ steps.version.outputs.version }}.zip"

      - name: Generate checksums
        run: |
          cd dist
          shasum -a 256 loop-commander-${{ steps.version.outputs.version }}-darwin-arm64.tar.gz > CHECKSUMS.txt
          shasum -a 256 LoopCommander-${{ steps.version.outputs.version }}.zip >> CHECKSUMS.txt
          cat CHECKSUMS.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: dist/
          retention-days: 7

  release:
    name: Create GitHub Release
    needs: build
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: dist/

      - name: Generate release notes
        id: release-notes
        run: |
          VERSION=${{ needs.build.outputs.version }}
          TAG="v${VERSION}"

          # Get commits since last release
          PREV_TAG=$(git tag -l 'v*' --sort=-version:refname | head -2 | tail -1)

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline --no-decorate)
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --oneline --no-decorate)
          fi

          # Create release notes
          NOTES="Release Loop Commander v${VERSION}

          ## Artifacts

          - \`loop-commander-${VERSION}-darwin-arm64.tar.gz\` - Rust binaries (loop-commander, lc-runner, lc)
          - \`LoopCommander-${VERSION}.zip\` - Native macOS app bundle

          ## Installation

          Extract the tarball and place binaries in your PATH:
          \`\`\`bash
          tar -xzf loop-commander-${VERSION}-darwin-arm64.tar.gz
          sudo mv loop-commander lc-runner lc /usr/local/bin/
          \`\`\`

          Or run the native app by extracting the zip and double-clicking Loop Commander.app.

          ## Changes

          \`\`\`
          ${COMMITS}
          \`\`\`"

          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: v${{ needs.build.outputs.version }}
          name: Release v${{ needs.build.outputs.version }}
          body: ${{ steps.release-notes.outputs.notes }}
          draft: false
          prerelease: false
          artifacts: |
            dist/loop-commander-${{ needs.build.outputs.version }}-darwin-arm64.tar.gz
            dist/LoopCommander-${{ needs.build.outputs.version }}.zip
            dist/CHECKSUMS.txt
          artifactErrorsFailRelease: true
          makeLatest: true

  post-release:
    name: Post-Release Verification
    needs: [build, release]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Verify release artifacts
        run: |
          VERSION=${{ needs.build.outputs.version }}
          echo "Release v${VERSION} created successfully"
          echo "Artifacts verified and published to GitHub Releases"
